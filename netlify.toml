[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from   = "/api/*"
  to     = "https://storeio-production.up.railway.app/api/:splat"
  status = 200
  force  = true

# SPA catch-all — must be last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
