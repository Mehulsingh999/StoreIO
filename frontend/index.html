<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StoreIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:     #3b82f6;
      --accent-dim: #1d4ed8;
      --radius:     12px;
      --shadow-md:  0 4px 24px rgba(0,0,0,.45);
      --shadow-lg:  0 8px 40px rgba(0,0,0,.65);
    }

    html { scroll-behavior: smooth; }

    body {
      background: #080b0f;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection { background: rgba(59,130,246,.25); color: #e2e8f0; }

    ::-webkit-scrollbar        { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track  { background: #0a0e14; }
    ::-webkit-scrollbar-thumb  { background: #1e3a5f; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #2d5a8e; }

    input, button, select, textarea { font-family: inherit; }
    button:disabled { opacity: 0.45; cursor: not-allowed !important; }

    :focus-visible {
      outline: 2px solid rgba(59,130,246,.55);
      outline-offset: 2px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
